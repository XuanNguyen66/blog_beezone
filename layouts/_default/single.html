{{ define "main" }}
<article class="post-container">
    <header class="post-header">
        <h1 class="post-title">{{ .Title }}</h1>
    </header>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eaeaea;">

    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
